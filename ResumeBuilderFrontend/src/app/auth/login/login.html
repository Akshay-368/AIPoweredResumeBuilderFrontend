<!-- New login form: premium segmented chooser improves discoverability for email vs phone login. -->
<div class="login-form">
    <p class="section-title">Welcome Back</p>
    <p class="section-subtitle">Choose a login method and continue to your dashboard.</p>

    <!-- Button-based segmented control is easier to tap/click than tiny radios. -->
    <div class="login-method" role="tablist" aria-label="Login method selection">
        <button
            type="button"
            class="method-btn"
            [class.active]="loginMethod === 'email'"
            (click)="setLoginMethod('email')"
        >
            Email Address
        </button>
        <button
            type="button"
            class="method-btn"
            [class.active]="loginMethod === 'phone'"
            (click)="setLoginMethod('phone')"
        >
            Phone Number
        </button>
    </div>

    <!-- Conditional inputs render only for the selected method. -->
    <input
        *ngIf="loginMethod === 'email'"
        placeholder="name@example.com"
        type="email"
        [(ngModel)]="email"
        name="email"
        required
    >

    <p *ngIf="loginMethod === 'email' && emailErrorMessage" style="color: #c92a2a; font-size: 12px; margin-top: 6px;">
        {{ emailErrorMessage }}
    </p>

    <input
        *ngIf="loginMethod === 'phone'"
        placeholder="10-digit phone number"
        type="tel"
        pattern="[0-9]{10}"
        [(ngModel)]="phone"
        name="phone"
        required
    >

    <p *ngIf="loginMethod === 'phone' && phoneErrorMessage" style="color: #c92a2a; font-size: 12px; margin-top: 6px;">
        {{ phoneErrorMessage }}
    </p>

    <!-- Password is shared by both login methods. -->
    <input placeholder="Password" type="password" [(ngModel)]="password" name="password" required>

    <!-- Disabled state prevents invalid submissions. -->
    <button type="button" [disabled]="!isValidLogin() || isSubmitting" (click)="onLogin()">
        {{ isSubmitting ? 'Logging in...' : 'Login' }}
    </button>
</div>
